<!DOCTYPE html>
<html>
<head><title>VulnLab — Upload</title>
<style>
body{font-family:monospace;background:#0d1117;color:#c9d1d9;margin:0}
nav{background:#161b22;padding:12px 24px;display:flex;gap:20px;border-bottom:1px solid #30363d}
nav a{color:#58a6ff;text-decoration:none}
.container{max-width:900px;margin:40px auto;padding:0 20px}
button{padding:8px 20px;background:#238636;border:none;border-radius:4px;color:#fff;cursor:pointer;margin-top:8px}
.msg{background:#1c2128;border:1px solid #3fb950;padding:12px;border-radius:4px;color:#3fb950;margin-top:16px}
</style></head>
<body>
<nav>
  <strong style="color:#f0f6fc">VulnLab</strong>
  <a href="/">Home</a><a href="/dashboard">Dashboard</a><a href="/logout">Logout</a>
</nav>
<div class="container">
  <h2 style="color:#f0f6fc">File Upload</h2>
  <form method="POST" enctype="multipart/form-data">
    <input type="file" name="file" style="color:#c9d1d9"><br>
    <button type="submit">Upload</button>
  </form>
  {% if msg %}<div class="msg">✓ {{msg}}</div>{% endif %}
</div>
</body>
</html>
