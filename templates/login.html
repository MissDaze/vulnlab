<!DOCTYPE html>
<html>
<head><title>VulnLab — Login</title>
<style>
body{font-family:monospace;background:#0d1117;color:#c9d1d9;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.box{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:32px;width:340px}
h2{color:#f0f6fc;margin:0 0 24px}
input{width:100%;padding:8px;background:#0d1117;border:1px solid #30363d;border-radius:4px;color:#c9d1d9;margin-bottom:12px;box-sizing:border-box}
button{width:100%;padding:10px;background:#238636;border:none;border-radius:4px;color:#fff;cursor:pointer;font-size:14px}
.error{background:#3d1f1f;border:1px solid #f85149;border-radius:4px;padding:10px;margin-bottom:12px;color:#f85149;font-size:13px;word-break:break-all}
a{color:#58a6ff;font-size:13px}
</style></head>
<body>
<div class="box">
  <h2>🔐 VulnLab Login</h2>
  {% if error %}<div class="error">{{error}}</div>{% endif %}
  <form method="POST">
    <input name="username" placeholder="Username" autocomplete="off">
    <input name="password" type="password" placeholder="Password">
    <button type="submit">Sign In</button>
  </form>
  <p style="margin-top:16px"><a href="/">← Back</a></p>
</div>
</body>
</html>
